syntax = "proto3";

package messages;

option go_package = "./protoStruct";

// ------------------------------------------- Общий запрос от клиента
message Request {
  string type       = 1;          
  bytes  payload    = 2;
  string token      = 3;          
}
// ------------------------------------------- Общий ответ от сервера
message Response {
  bool   ok         = 1;
  bytes  result     = 2;         
  string error      = 3;
}

// ------------------------------------------- Структуры транзакций
message ReqTransaction {
  int64 transaction_id = 1;
}
message RespTransaction {
  string hash         = 1;
  string source       = 2;
  string description  = 3;
  string type         = 4;
  string status       = 5;

  int64 created_at = 6;
  int64 updated_at = 7;
}
message ReqTransactionList {
  // empty slice of byte
}
message RespTransactionList{
  repeated RespTransaction transactions = 1;
}

// ------------------------------------------- Структуры пользователей
message ReqRegistration {
  string login = 1;
  string password = 2;
}
message RespRegistration {
 // empty slice of byte
}
message ReqAuthentication {
  string login = 1;
  string password = 2;
}
message RespAuthentication {
  string newToken = 1;
}