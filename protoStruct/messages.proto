syntax = "proto3";

package messages;

option go_package = "./protoStruct";

// ------------------------------------------- Общий запрос от клиента
message Request {
  string type       = 1;          
  bytes  payload    = 2;
  string token      = 3;          
}
// ------------------------------------------- Общий ответ от сервера
message Response {
  bool   ok         = 1;
  bytes  result     = 2;         
  string error      = 3;
}

// ------------------------------------------- Структуры транзакций
message ReqTransaction {
  int64 transaction_id = 1;
}
message RespTransaction {
  int64 transaction_id = 1;
  string hash         = 2;
  string source       = 3;
  int64 amount  = 4;
  string direction         = 5;
  string status       = 6;

  int64 created_at = 7;
  int64 updated_at = 8;
}
message ReqTransactionList {
  // empty slice of byte
}
message RespTransactionList{
  repeated RespTransaction transactions = 1;
}

// ------------------------------------------- Структуры сомнительных транзакций
message ReqDoubtfulTransaction {
  int64 assessment_id = 1;
}
message RespDoubtfulTransaction {
  int64 transaction_id = 1;
  int64 risk_score = 2;
  string description = 3;
  string decision = 4;
}

message ReqDoubtfulTransactionList {
  // empty slice of byte
}
message RespDoubtfulTransactionList {
  repeated RespDoubtfulTransaction doubtful_transactions = 1;
}

// ------------------------------------------- Структуры пользователей
message ReqRegistration {
  string login = 1;
  string password = 2;
}
message RespRegistration {
 // empty slice of byte
}
message ReqAuthentication {
  string login = 1;
  string password = 2;
}
message RespAuthentication {
  string newToken = 1;
  int64 role_id = 2;
}

// ------------------------------------------- Структуры фрод правил
message ReqFraudRule {
  int64 rule_id = 1;
}

message RespFraudRule {
  int64 rule_id = 1;
  string name = 2;
  bool active = 3;
  string field_name = 4;
  string operator = 5;
  string value = 6;
  int64 add_risk = 7;
}

message ReqFraudRuleList {
  // empty slice of byte
}

message RespFraudRuleList {
  repeated RespFraudRule fraud_rules = 1;
}